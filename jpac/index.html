<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
  <head>
    <title>AppletLoader</title>
  </head>
  <body>

  <applet code="org.lwjgl.util.applet.AppletLoader" archive="lwjgl_util_applet.jar" codebase="." width="800" height="600">
  
    <param name="al_title" value="appletloadertest">
    
    <param name="al_main" value="Game">
    
    <param name="al_logo" value="appletlogo.png">
    
    <param name="al_progressbar" value="appletprogress.gif">
    
    <param name="al_jars" value="lwjgl_applet.jar, lwjgl.jar, lwjgl_util.jar, jpac_applet.jar, slick-util.jar, jogg-0.0.7.jar, jorbis-0.0.15.jar">
    
    <param name="al_windows" value="windows_natives.jar">
    
    <param name="al_linux" value="linux_natives.jar">
    
    <param name="al_mac" value="macosx_natives.jar">

    <param name="al_solaris" value="solaris_natives.jar">
    
    <param name="al_version" value="0.1">
    
    <param name="boxbgcolor" value="#000000">
    
    <param name="boxfgcolor" value="#0000ff">
    
    <param name="separate_jvm" value="true">
  </applet>

  </body>
</html>
